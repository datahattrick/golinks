<div class="max-w-4xl mx-auto">
    <div class="mb-6">
        <h1 class="text-2xl font-bold bg-gradient-to-r from-gray-900 to-gray-600 dark:from-white dark:to-gray-400 bg-clip-text text-transparent">Manage Links</h1>
        {{if .IsModerator}}
        <p class="text-gray-800 dark:text-gray-400 mt-1">View, edit, and monitor the health of all links</p>
        {{else}}
        <p class="text-gray-800 dark:text-gray-400 mt-1">View and manage links you've created</p>
        {{end}}
    </div>

    <!-- Search box lives outside the swap target so focus is never lost -->
    <form id="manage-search-form" hx-get="/manage" hx-target="#manage-links-list" hx-swap="innerHTML" class="mb-4">
        <input type="hidden" id="manage-filter-state" name="filter" value="{{.Filter}}">
        <input type="hidden" id="manage-scope-state" name="scope" value="{{.Scope}}">
        <input type="hidden" id="manage-perpage-state" name="per_page" value="{{.Pagination.PerPage}}">
        <input type="hidden" name="page" value="1">
        <div class="relative">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0"/>
            </svg>
            <input type="text" name="q" value="{{.Search}}"
                placeholder="Search keyword, URL, or description…"
                class="w-full pl-9 pr-4 py-2 text-sm rounded-xl glass-card border-0 focus:ring-2 focus:ring-brand-500 focus:outline-none transition-all"
                hx-get="/manage" hx-target="#manage-links-list" hx-swap="innerHTML"
                hx-trigger="input changed delay:300ms, search"
                hx-include="closest form">
        </div>
    </form>

    <!-- Links list container -->
    <div id="manage-links-list">
        {{template "partials/manage_links_list" .}}
    </div>
</div>
